name: devisha1
description: "A premium Flutter project for Shri Ishwar Trading."

# Prevents accidental publishing to pub.dev
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- UI & Glassmorphism ---
  glassmorphism: ^3.0.0
  google_fonts: ^6.2.1
  
  # --- Animations ---
  flutter_animate: ^4.5.0
  animate_do: ^3.3.4
  lottie: ^3.1.2

  # --- Icons ---
  cupertino_icons: ^1.0.8

  # --- PDF & Reporting Features ---
  pdf: ^3.10.8
  printing: ^5.11.1
  path_provider: ^2.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Asset section corrected for your specific path
  assets:
    - assets/images/welcome.png
    # Alternatively, you can include the whole folder like this:
    # - assets/images/